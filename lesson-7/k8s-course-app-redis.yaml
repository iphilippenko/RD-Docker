apiVersion: v1
kind: ConfigMap
metadata:
  name: course-app-config
data:
  APP_STORE: "redis"
  APP_REDIS_URL: "redis://redis:6379/0"
  APP_VERSION: "0.0.1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-app
  labels:
    app: course-app
spec:
  replicas: 10
  strategy:
#    type: RollingUpdate
#    rollingUpdate:
#      maxUnavailable: 3
#      maxSurge: 3
#    type: RollingUpdate
#    rollingUpdate:
#      maxUnavailable: 0
#      maxSurge: 1
    type: Recreate
  selector:
    matchLabels:
      app: course-app
  template:
    metadata:
      labels:
        app: course-app
    spec:
      containers:
        - name: course-app
          image: iphilippenko/course-app:1.0.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: course-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: course-app
spec:
  type: NodePort
  selector:
    app: course-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
