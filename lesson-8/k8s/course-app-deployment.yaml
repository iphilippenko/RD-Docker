apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-app
  labels:
    app: course-app
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
#    rollingUpdate:
#      maxUnavailable: 3
#      maxSurge: 3
#    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
#    type: Recreate
  selector:
    matchLabels:
      app: course-app
  template:
    metadata:
      labels:
        app: course-app
    spec:
      containers:
        - name: course-app
          image: iphilippenko/course-app:1.0.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: course-app-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
