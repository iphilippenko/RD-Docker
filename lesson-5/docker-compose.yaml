services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_STORE: ${APP_STORE}
      APP_REDIS_URL: ${APP_REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - appdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  appdata:
